name: Actualizar datos WWLLN

# Cuándo se ejecuta:
#   - Cada 6 horas (00:00, 06:00, 12:00, 18:00 UTC)
#   - Y manualmente desde la pestaña Actions cuando quieras forzarlo
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

# Permisos para que el workflow pueda hacer commit y push
permissions:
  contents: write

jobs:
  actualizar-wwlln:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests

      - name: Ejecutar wwlln_updater.py
        run: python backend/wwlln_updater.py

      - name: Hacer commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add wwlln/
          if git diff --staged --quiet; then
            echo "Sin cambios nuevos en datos WWLLN."
          else
            git commit -m "WWLLN: actualización automática $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
